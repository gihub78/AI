<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>我的 GitHub AI 助手</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; }
        #chat-box { height: 400px; border: 1px solid #ccc; overflow-y: auto; padding: 10px; margin-bottom: 10px; background: #f9f9f9; border-radius: 8px; }
        input { width: 75%; padding: 10px; }
        button { padding: 10px 20px; cursor: pointer; background: #238636; color: white; border: none; border-radius: 4px; }
        .user { color: #0969da; margin-bottom: 5px; text-align: right; }
        .ai { color: #1f2328; margin-bottom: 15px; font-weight: bold; background: #dafbe1; padding: 8px; border-radius: 5px; }
    </style>
</head>
<body>
    <h2>AI 聊天窗口</h2>
    <div id="chat-box"></div>
    <input type="text" id="user-input" placeholder="输入问题..." onkeypress="if(event.keyCode==13) askAI()">
    <button onclick="askAI()">发送</button>

    <script>
        // 注意：请务必重新生成一个 Token 填入，且不要泄露给别人
        const GITHUB_TOKEN = "你的_GITHUB_TOKEN_填在这里"; 

        async function askAI() {
            const inputField = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            const question = inputField.value;
            if (!question) return;

            chatBox.innerHTML += `<div class="user">我: ${question}</div>`;
            inputField.value = '';

            try {
                // 修复了 URL 路径
                const response = await fetch("https://models.inference.ai.azure.com", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${GITHUB_TOKEN}`
                    },
                    body: JSON.stringify({
                        messages: [
                            { role: "system", content: "你是一个简洁的助手。" },
                            { role: "user", content: question }
                        ],
                        model: "gpt-4o-mini",
                        max_tokens: 1000
                    })
                });

                if (!response.ok) {
                    throw new Error(`请求失败: ${response.status} ${response.statusText}`);
                }

                const data = await response.json();
                const answer = data.choices[0].message.content;
                
                chatBox.innerHTML += `<div class="ai">AI: ${answer}</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            } catch (error) {
                chatBox.innerHTML += `<div style="color:red; margin: 10px 0;">错误: ${error.message}</div>`;
            }
        }
    </script>
</body>
</html>
