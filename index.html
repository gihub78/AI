<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的小龙虾 AI 助手</title>
    <style>
        /* 简单的聊天框样式 */
        #claw-container { position: fixed; bottom: 20px; right: 20px; width: 300px; border: 1px solid #ccc; border-radius: 10px; background: #fff; box-shadow: 0 4px 8px rgba(0,0,0,0.1); font-family: sans-serif; }
        #claw-header { background: #ff4757; color: white; padding: 10px; border-radius: 10px 10px 0 0; text-align: center; }
        #claw-messages { height: 300px; overflow-y: auto; padding: 10px; font-size: 14px; }
        #claw-input-area { display: flex; border-top: 1px solid #eee; }
        #claw-input { flex: 1; border: none; padding: 10px; outline: none; }
        #claw-send { border: none; background: #ff4757; color: white; padding: 0 15px; cursor: pointer; }
    </style>
</head>
<body>

<div id="claw-container">
    <div id="claw-header">🦞 小龙虾 AI 助手</div>
    <div id="claw-messages"></div>
    <div id="claw-input-area">
        <input type="text" id="claw-input" placeholder="输入指令..." onkeypress="handleKeyPress(event)">
        <button id="claw-send" onclick="sendMessage()">发送</button>
    </div>
</div>

<script>
    // 假设你的 OpenClaw 运行在本地 8000 端口
    const socket = new WebSocket('ws://localhost:8000/ws/claw');

    socket.onmessage = function(event) {
        const data = JSON.parse(event.data);
        appendMessage('AI', data.text);
    };

    function sendMessage() {
        const input = document.getElementById('claw-input');
        const text = input.value.trim();
        if (text) {
            appendMessage('你', text);
            socket.send(JSON.stringify({ message: text }));
            input.value = '';
        }
    }

    function appendMessage(sender, text) {
        const box = document.getElementById('claw-messages');
        const msg = document.createElement('div');
        msg.innerHTML = `<strong>${sender}:</strong> ${text}`;
        box.appendChild(msg);
        box.scrollTop = box.scrollHeight;
    }

    function handleKeyPress(e) {
        if (e.key === 'Enter') sendMessage();
    }
</script>
</body>
</html>
