<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>我的 GitHub AI 助手</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; }
        #chat-box { height: 300px; border: 1px solid #ccc; overflow-y: auto; padding: 10px; margin-bottom: 10px; background: #f9f9f9; }
        input { width: 80%; padding: 10px; }
        button { padding: 10px; cursor: pointer; }
        .user { color: blue; margin-bottom: 5px; }
        .ai { color: green; margin-bottom: 15px; font-weight: bold; }
    </style>
</head>
<body>
    <h2>AI 聊天窗口</h2>
    <div id="chat-box"></div>
    <input type="text" id="user-input" placeholder="输入问题...">
    <button onclick="askAI()">发送</button>

    <script>
        // 【关键步骤】在这里填入你的 GitHub 访问令牌
        const GITHUB_TOKEN = "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"; 

        async function askAI() {
            const inputField = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            const question = inputField.value;
            if (!question) return;

            // 显示用户问题
            chatBox.innerHTML += `<div class="user">我: ${question}</div>`;
            inputField.value = '';

            try {
                const response = await fetch("https://models.inference.ai.azure.com", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${GITHUB_TOKEN}`
                    },
                    body: JSON.stringify({
                        messages: [{ role: "user", content: question }],
                        model: "gpt-4o", // 或者使用 "meta-llama-3-8b-instruct" 等
                        max_tokens: 1000
                    })
                });

                const data = await response.json();
                const answer = data.choices[0].message.content;
                
                // 显示 AI 回答
                chatBox.innerHTML += `<div class="ai">AI: ${answer}</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            } catch (error) {
                chatBox.innerHTML += `<div style="color:red">错误: ${error.message}</div>`;
            }
        }
    </script>
</body>
</html>
