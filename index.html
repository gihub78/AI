<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub AI 助手</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; background: #f4f4f9; }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 10px 15px; border-radius: 15px; max-width: 80%; word-wrap: break-word; }
        .user { align-self: flex-end; background: #007bff; color: white; }
        .ai { align-self: flex-start; background: #e9e9eb; color: #333; }
        #input-area { padding: 20px; background: white; border-top: 1px solid #ddd; display: flex; gap: 10px; }
        input[type="text"] { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 10px 20px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .config { padding: 10px 20px; background: #fff3cd; font-size: 14px; border-bottom: 1px solid #ffeeba; }
    </style>
</head>
<body>

<div class="config">
    <label>GitHub Token:</label>
    <input type="password" id="token" placeholder="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">
</div>

<div id="chat-container">
    <div class="message ai">你好！请在上方输入你的 GitHub Token，然后就可以开始聊天了。</div>
</div>

<div id="input-area">
    <input type="text" id="userInput" placeholder="输入消息..." onkeypress="if(event.keyCode==13) sendMessage()">
    <button onclick="sendMessage()">发送</button>
</div>

<script>
    const chatContainer = document.getElementById('chat-container');

    async function sendMessage() {
        const token = document.getElementById('token').value;
        const input = document.getElementById('userInput');
        const text = input.value.trim();

        if (!token) return alert("请先输入 GitHub Token！");
        if (!text) return;

        // 添加用户消息
        appendMessage('user', text);
        input.value = '';

        try {
            const response = await fetch("https://models.inference.ai.azure.com", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${token}` // 使用 Bearer Token 认证
                },
                body: JSON.stringify({
                    messages: [
                        { role: "system", content: "你是一个有用的助手。" },
                        { role: "user", content: text }
                    ],
                    model: "gpt-4o", // 你可以更改为 gpt-4o-mini 或 llama-3.3-70b-instruct
                    temperature: 0.8
                })
            });

            const data = await response.json();
            if (data.choices && data.choices[0]) {
                appendMessage('ai', data.choices[0].message.content);
            } else {
                appendMessage('ai', "错误: " + (data.error?.message || "未知错误"));
            }
        } catch (error) {
            appendMessage('ai', "连接失败: " + error.message);
        }
    }

    function appendMessage(role, content) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${role}`;
        msgDiv.innerText = content;
        chatContainer.appendChild(msgDiv);
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }
</script>

</body>
</html>
